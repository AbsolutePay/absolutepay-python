name: Release

# Publishes to PyPI ONLY when a GitHub Release is published (or via manual dispatch after review).
# Never runs on a push. Auth = PyPI Trusted Publisher (OIDC) — NO PYPI_TOKEN secret needed.
# Configure on pypi.org → project → Publishing → add a GitHub trusted publisher:
#   Owner=AbsolutePay, Repo=absolutepay-python, Workflow=release.yml, Environment=pypi.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip build
      - run: pip install -e ".[dev]"
      - name: Test
        run: python -m pytest -q
      - name: Build sdist + wheel
        run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # OIDC: lets PyPI verify this workflow as the trusted publisher
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      # No token — PyPI authenticates via the GitHub OIDC trusted publisher.
      - name: Publish to PyPI (OIDC trusted publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
